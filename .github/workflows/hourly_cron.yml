name: Hourly Job Check

on:
  schedule:
    - cron: '17 * * * *' # Runs at minute 15 of every hour
  workflow_dispatch: # Allows manual button click

permissions:
  contents: write # Needed for the keepalive commit

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          CHANNEL_LINKS: ${{ secrets.CHANNEL_LINKS }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          
        run: python main.py

      # # This section prevents GitHub from disabling the bot after 60 days
      # - name: Keepalive Workflow
      #   uses: gautamkrishnar/keepalive-workflow@v2
