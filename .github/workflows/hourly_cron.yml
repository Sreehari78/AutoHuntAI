name: Hourly Job Check

on:
  schedule:
    - cron: '17 * * * *' # Runs at minute 15 of every hour
  workflow_dispatch: # Allows manual button click

permissions:
  contents: write # Needed for the keepalive commit

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      # This section prevents GitHub from disabling the bot after 60 days
      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2
